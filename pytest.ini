[pytest]
minversion = 7.0
testpaths = tests
strict_markers = true

markers =
    integration: Control-plane + API integration (DB, engine)
    e2e: End-to-end integration tests
    engine: Engine contract / runtime tests (prompt-agnostic)
    determinism: Deterministic behavior and reproducibility
    security: Security controls and abuse cases
    compliance: Regulatory and policy compliance
    performance: Load, timing, and performance characterization

addopts =
    -ra
    --tb=short
    -v
    --no-header

filterwarnings =
    once::DeprecationWarning
    once::PendingDeprecationWarning
